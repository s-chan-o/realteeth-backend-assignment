services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: realteeth
      MYSQL_USER: realteeth
      MYSQL_PASSWORD: realteeth
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: realteeth
      DB_USERNAME: realteeth
      DB_PASSWORD: realteeth
      MOCK_WORKER_API_KEY: ${MOCK_WORKER_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy